name: Generate Profile Assets

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily at 03:00 UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # ---------- Snake contribution animation ----------
      # Dark background, purple → cyan gradient snake body for a sleeker look
      - name: Generate snake animation SVG
        uses: Platane/snk@v3
        with:
          github_user_name: BhanukaJanappriya
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#8b5cf6,#6366f1,#3b82f6,#22d3ee&color_dots=#161b22,#1f2937,#33415c,#3b5c8f,#4d7ec2&color_bg=#0d1117

      # ---------- Trophy SVG ----------
      - name: Generate trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: BhanukaJanappriya
          output_path: dist/trophy.svg
          theme: radical
          no-frame: "true"
          row: "1"
          column: "7"
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------- Push everything to the "output" branch ----------
      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
